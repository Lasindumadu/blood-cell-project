# Starter hyperparameters for blood cell detection (Ultralytics hyp format)
# Tune these values as needed. Values here are conservative for small-object detection.
lr0: 0.01        # initial learning rate
lrf: 0.01       # final learning rate = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_bias_lr: 0.1
box: 7.5
cls: 0.5
dfl: 1.5
label_smoothing: 0.0
fl_gamma: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
mosaic: 1.0
mixup: 0.0
perspective: 0.0
translate: 0.1
scale: 0.5
shear: 0.0